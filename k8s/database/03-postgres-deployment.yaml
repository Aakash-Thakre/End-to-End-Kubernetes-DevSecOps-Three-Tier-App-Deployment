apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-db
  namespace: jerney
  labels:
    app.kubernetes.io/name: jerney-db
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: database

spec: 
  replicas: 1
  strategy: 
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jerney-db
  
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jerney-db
        app.kubernetes.io/part-of: jerney
        app.kubernetes.io/component: database

    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: "kapenter.sh/disrupted"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: postgres-db
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          envFrom:
            - secretRef:
                name: jerney-db-secret
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false 
            runAsNonRoot: false
          livenessProbe:
              exec:
                command: ["pg_isReady", "-U", "jerney_user", "-d", "jerney-db"]
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
          readinessProbe:
              exec:
                command: ["pg_isready", "-U", "jerney_user", "-d", "jerney_db"]
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 3
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: jerney-db-pvc
